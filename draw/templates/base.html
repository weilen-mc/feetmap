<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeetMap</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #fdfdfd;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: #1a1a2e;
            color: #fff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 1rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #e94560;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Form styling */
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        .auth-container h2 {
            margin-top: 0;
            color: #1a1a2e;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }

        .btn:hover {
            background: #d03a55;
        }

        .btn-secondary {
            background: #1a1a2e;
        }

        .btn-secondary:hover {
            background: #0f0f1b;
        }

        ul.errorlist {
            color: #e94560;
            list-style-type: none;
            padding: 0;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <header>
        <h1>FeetMap</h1>
        <nav>
            {% if user.is_authenticated %}
            <span>Hello, {{ user.username }}</span>
            <a href="{% url 'index' %}">Draw</a>
            <a href="{% url 'gallery' %}">Gallery</a>
            <a href="{% url 'upload_outline' %}">Upload Outline</a>
            <form action="{% url 'select_outline' %}" method="post" style="display:inline; margin-left: 1rem;">
                {% csrf_token %}
                <select name="outline_id" onchange="this.form.submit()"
                    style="padding: 0.3rem; border-radius: 4px; border: 1px solid #ddd;">
                    <option value="">-- Select Outline --</option>
                    {% for outline in all_outlines %}
                    {% if selected_outline and selected_outline.id == outline.id %}
                    <option value="{{ outline.id }}" selected>{{ outline.name }}</option>
                    {% else %}
                    <option value="{{ outline.id }}">{{ outline.name }}</option>
                    {% endif %}
                    {% endfor %}
                </select>
            </form>
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit"
                    style="background:none; border:none; color:#fff; cursor:pointer; font-size:1rem; margin-left:1rem; font-weight:500;">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </nav>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
