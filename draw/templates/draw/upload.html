{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <h2>Upload Outline</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            {{ field.label_tag }}
            {{ field }}
            {{ field.errors }}
        </div>
        {% endfor %}
        <button type="submit" class="btn">Upload</button>
    </form>
</div>
{% endblock %}
